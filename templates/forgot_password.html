<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WakalaPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e6edf3;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 450px; padding: 20px; width: 100%; }
        .card {
            background: #141b2d;
            border: 1px solid #2a3a5c;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .card-header { text-align: center; margin-bottom: 30px; }
        .card-header .logo { font-size: 2.5rem; color: #60a5fa; }
        .card-header h2 { color: #e6edf3; font-weight: 700; font-size: 1.5rem; margin-top: 10px; }
        .card-header p { color: #8b949e; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { color: #8b949e; font-weight: 500; font-size: 0.85rem; display: block; margin-bottom: 0.4rem; }
        .form-group .form-control {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            font-size: 0.95rem;
        }
        .form-group .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); outline: none; }
        .btn-send {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }
        .footer { text-align: center; margin-top: 1.5rem; }
        .footer a { color: #60a5fa; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .alert {
            border-radius: 10px;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: none;
        }
        .alert-success { background: rgba(16, 185, 129, 0.2); color: #34d399; border-left: 4px solid #10b981; }
        .alert-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border-left: 4px solid #ef4444; }
        @media (max-width: 480px) { .card { padding: 25px 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="logo"><i class="bi bi-currency-dollar"></i></div>
                <h2>Forgot Password</h2>
                <p>Enter your email to receive a reset link</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="email"><i class="bi bi-envelope"></i> Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn-send">
                    <i class="bi bi-envelope-paper"></i> Send Reset Link
                </button>
            </form>

            <div class="footer">
                <a href="{{ url_for('auth.login') }}"><i class="bi bi-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
