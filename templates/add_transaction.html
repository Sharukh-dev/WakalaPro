{% extends "base.html" %}

{% block content %}

<div class="container">

<h2 class="mb-4">
Add Transaction
</h2>


<form method="POST">


<div class="row">


<div class="col-md-6 mb-3">

<label class="form-label">
Merchant
</label>

<select name="merchant_id" class="form-select" required>

<option value="">
Select Merchant
</option>

{% for m in merchants %}

<option value="{{ m.id }}">

{{ m.name }}

</option>

{% endfor %}

</select>

</div>





<div class="col-md-6 mb-3">

<label class="form-label">
Operator
</label>

<select name="operator_id" class="form-select" required>

<option value="">
Select Operator
</option>


{% for operator in operators %}

<option value="{{ operator.id }}">

{{ operator.name }}

</option>

{% endfor %}


</select>

</div>





<div class="col-md-6 mb-3">

<label class="form-label">
Transaction Type
</label>

<select name="transaction_type" class="form-select" required>


<option value="Deposit">
Deposit
</option>


<option value="Withdraw">
Withdraw
</option>


<option value="Airtime">
Airtime
</option>


</select>

</div>





<div class="col-md-6 mb-3">

<label class="form-label">
Amount
</label>

<input 
type="number"
step="0.01"
name="amount"
class="form-control"
required>

</div>





<div class="col-md-6 mb-3">

<label class="form-label">
Phone
</label>

<input 
type="text"
name="phone"
class="form-control"
required>

</div>





<div class="col-md-6 mb-3">

<label class="form-label">
Reference Number
</label>

<input 
type="text"
name="reference"
class="form-control">

</div>


</div>



<button class="btn btn-success">

Save Transaction

</button>


<a href="{{ url_for('transactions.index') }}"
class="btn btn-secondary">

Cancel

</a>


</form>


</div>


{% endblock %}
